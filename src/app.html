<!doctype html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- SEO Basics -->
		<meta name="robots" content="index, follow" />
		<meta
			name="googlebot"
			content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
		/>
		<meta
			name="bingbot"
			content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
		/>
		<link rel="canonical" href="https://schoolcbt.dev/" />

		<!-- Primary Meta Tags -->
		<title>SchoolCBT – Nigeria's Premier AI-Powered CBT Platform</title>
		<meta name="title" content="SchoolCBT – Nigeria's Premier AI-Powered CBT Platform" />
		<meta
			name="description"
			content="Guaranteed exam readiness for JAMB, WAEC & NECO through AI-orchestrated CBT practice, predictive analytics, and full Nigerian curriculum coverage."
		/>
		<meta
			name="keywords"
			content="schoolcbt, JAMB CBT, WAEC practice, NECO practice, Nigeria exam prep, AI CBT platform, pass JAMB, study WAEC, RaaS Nigeria"
		/>
		<meta name="author" content="EwinProject" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://schoolcbt.dev/" />
		<meta property="og:site_name" content="SchoolCBT" />
		<meta property="og:title" content="SchoolCBT – Nigeria's Premier AI CBT Platform" />
		<meta
			property="og:description"
			content="Ace JAMB, WAEC & NECO with AI-powered CBT practice. 1.2M+ curriculum-verified questions, predictive analytics, and tutor matching."
		/>
		<meta property="og:image" content="https://schoolcbt.dev/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="en_NG" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://schoolcbt.dev/" />
		<meta
			property="twitter:title"
			content="SchoolCBT – AI-Powered CBT Platform for Nigerian Students"
		/>
		<meta
			property="twitter:description"
			content="Ace JAMB, WAEC & NECO with 1.2M+ AI-curated questions, pass probability analytics, and matched tutors."
		/>
		<meta property="twitter:image" content="https://schoolcbt.dev/og-image.png" />
		<meta name="twitter:site" content="@schoolcbt" />

		<!-- Schema.org structured data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "EducationalOrganization",
				"name": "SchoolCBT",
				"url": "https://schoolcbt.dev",
				"description": "Nigeria's premier AI-powered Results-as-a-Service CBT platform for JAMB, WAEC, NECO and NABTEB exam preparation.",
				"address": {
					"@type": "PostalAddress",
					"addressCountry": "NG",
					"addressLocality": "Lagos"
				},
				"sameAs": ["https://twitter.com/schoolcbt", "https://facebook.com/schoolcbt"]
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="antialiased">
		<div class="contents">%sveltekit.body%</div>
	</body>
</html>
