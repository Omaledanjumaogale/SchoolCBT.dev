<!doctype html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
		<meta name="theme-color" content="#002366" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		
		<!-- SEO Basics -->
		<meta name="robots" content="index, follow" />
		<meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
		<meta name="bingbot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

		<!-- Primary Meta Tags -->
		<title>SchoolCBT - Nigeria's Premier AI-Powered CBT Platform</title>
		<meta name="title" content="SchoolCBT - Nigeria's Premier AI-Powered CBT Platform" />
		<meta name="description" content="Guaranteed exam readiness for JAMB, WAEC & NECO through AI-orchestrated practice batches, predictive analytics, and curriculum grounding." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://schoolcbt.ewinproject.org/" />
		<meta property="og:title" content="SchoolCBT - Results as a Service (RaaS)" />
		<meta property="og:description" content="Ace your exams with AI-powered CBT practice. 1.2M+ questions grounded in Nigerian curriculum." />
		<meta property="og:image" content="https://schoolcbt.ewinproject.org/og-image.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://schoolcbt.ewinproject.org/" />
		<meta property="twitter:title" content="SchoolCBT - Results as a Service (RaaS)" />
		<meta property="twitter:description" content="Ace your exams with AI-powered CBT practice. 1.2M+ questions grounded in Nigerian curriculum." />
		<meta property="twitter:image" content="https://schoolcbt.ewinproject.org/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="font-dm bg-[#04091a] text-[#dde4f5] antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
